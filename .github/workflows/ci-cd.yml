name: Academic Synergy CI/CD Pipeline

on:
  push:
    branches:
      - main
      - feature/tuan
  pull_request:
    branches:
      - main
      - feature/tuan

jobs:
  build-and-verify:
    name: Build and Verify Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package.json
            frontend/package.json
            backend/package.json

      - name: Install Root Dependencies
        run: npm install

      - name: Install and Build Frontend
        run: |
          npm install --prefix frontend
          npm run build --prefix frontend

      - name: Install and Verify Backend
        run: |
          npm install --prefix backend
          # Run syntax checks on key backend files to prevent runtime errors
          node --check backend/server.js
          node --check backend/routes/auth.js
          node --check backend/routes/surveys.js
          node --check backend/routes/reports.js
          node --check backend/routes/users.js
          node --check backend/routes/categories.js
