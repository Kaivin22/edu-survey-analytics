version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: edu-survey-backend:latest
    container_name: edu_survey_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - JWT_SECRET=edu_survey_stakeholder_secret_key_2026
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - backend-data:/usr/src/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    image: edu-survey-frontend:latest
    container_name: edu_survey_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  backend-data:
